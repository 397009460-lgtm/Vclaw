<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vclaw · 对话</title>
  <link rel="stylesheet" href="./assets/css/app-2026.css">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1 class="brand-logo">VCLAW</h1>
      </div>
      
      <button id="newChatBtn" class="btn-new-chat">+ 新对话</button>
      
      <nav class="chat-history" id="chatHistory">
        <!-- 对话历史将动态加载 -->
      </nav>
      
      <div class="sidebar-footer">
        <div class="user-info">
          <span id="userName">用户</span>
          <span id="tokenCount" class="token-badge">0 tokens</span>
        </div>
        <a href="/profile.html" class="link-settings">设置</a>
      </div>
    </aside>
    
    <main class="chat-main">
      <div class="chat-messages" id="chatMessages">
        <div class="welcome-message">
          <h2>欢迎来到 Vclaw</h2>
          <p>有什么我可以帮助你的吗？</p>
        </div>
      </div>
      
      <div class="chat-input-area">
        <form id="chatForm" class="chat-form">
          <textarea id="messageInput" placeholder="输入消息..." rows="1"></textarea>
          <button type="submit" class="btn-send">发送</button>
        </form>
      </div>
    </main>
  </div>
  
  <script src="./assets/js/chat.js"></script>
</body>
</html>
