<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vclaw · 登录</title>
  <link rel="stylesheet" href="./assets/css/app-2026.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1 class="brand-logo">VCLAW</h1>
        <p class="brand-subtitle">维克斯 AI 助手</p>
      </div>
      
      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label for="username">用户名</label>
          <input type="text" id="username" name="username" required autocomplete="username" placeholder="请输入用户名">
        </div>
        
        <div class="form-group">
          <label for="password">密码</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="请输入密码">
        </div>
        
        <button type="submit" class="btn-primary btn-full">登录</button>
      </form>
      
      <div class="auth-footer">
        <p>还没有账号？<a href="/register.html" class="link">立即注册</a></p>
      </div>
    </div>
  </div>
  
  <script src="./assets/js/auth.js"></script>
</body>
</html>
