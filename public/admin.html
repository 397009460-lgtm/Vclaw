<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>维克斯 AI 助手 · 后台管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            body {
                padding: 5px;
            }
            .glass-card {
                padding: 15px !important;
            }
            .header h1 {
                font-size: 16px !important;
            }
            .stats {
                grid-template-columns: repeat(2, 1fr) !important;
                gap: 10px !important;
            }
            .stat-card .value {
                font-size: 20px !important;
            }
            table {
                font-size: 11px !important;
            }
            th, td {
                padding: 8px 4px !important;
            }
            .btn {
                padding: 6px 10px !important;
                font-size: 11px !important;
                margin-right: 4px !important;
            }
            .form-row {
                grid-template-columns: 1fr !important;
            }
            .modal-content {
                width: 95% !important;
                padding: 20px !important;
            }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.1),
                inset 0 -1px 0 rgba(255, 255, 255, 0.05);
            padding: 30px;
            margin-bottom: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #fff;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logout-btn {
            padding: 10px 20px;
            background: rgba(255, 87, 87, 0.2);
            border: 1px solid rgba(255, 87, 87, 0.4);
            border-radius: 12px;
            color: #ff6b6b;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(255, 87, 87, 0.3);
            box-shadow: 0 0 15px rgba(255, 87, 87, 0.3);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-card h3 {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            margin-bottom: 8px;
        }

        .stat-card .value {
            color: #fff;
            font-size: 28px;
            font-weight: 600;
        }

        .section-title {
            color: #fff;
            font-size: 18px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            font-size: 13px;
        }

        th, td {
            padding: 12px 10px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            word-break: break-word;
        }

        @media (max-width: 768px) {
            table {
                display: block;
                overflow-x: auto;
                white-space: nowrap;
            }
            th, td {
                padding: 8px 6px;
                font-size: 11px;
            }
        }

        th {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            font-weight: 600;
        }

        td {
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-active {
            background: rgba(76, 255, 139, 0.2);
            color: #4cff8b;
            border: 1px solid rgba(76, 255, 139, 0.4);
        }

        .status-disabled {
            background: rgba(255, 87, 87, 0.2);
            color: #ff6b6b;
            border: 1px solid rgba(255, 87, 87, 0.4);
        }

        .btn {
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            margin-right: 6px;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00f0ff 0%, #00ccff 50%, #0099ff 100%);
            color: #fff;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        .btn-danger {
            background: rgba(255, 87, 87, 0.2);
            color: #ff6b6b;
            border: 1px solid rgba(255, 87, 87, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.5);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            margin-bottom: 6px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            color: #fff;
            font-size: 13px;
            outline: none;
        }

        .form-group input:focus {
            border-color: rgba(0, 240, 255, 0.5);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(15, 15, 15, 0.95);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            max-width: 500px;
            width: 90%;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            color: #fff;
            font-size: 20px;
        }

        .close-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 24px;
            cursor: pointer;
        }

        .message {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.error {
            background: rgba(255, 87, 87, 0.2);
            border: 1px solid rgba(255, 87, 87, 0.4);
            color: #ff6b6b;
        }

        .message.success {
            background: rgba(76, 255, 139, 0.2);
            border: 1px solid rgba(76, 255, 139, 0.4);
            color: #4cff8b;
        }
    </style>

    <link rel="stylesheet" href="/assets/css/modern-2026.css">
</head>
<body>
    <div class="container">
        <div class="glass-card">
            <div class="header">
                <h1>🦞 维克斯 AI 助手 · 后台管理</h1>
                <button class="logout-btn" onclick="logout()">退出登录</button>
            </div>

            <div id="message" class="message"></div>

            <!-- 统计卡片 -->
            <div class="stats">
                <div class="stat-card">
                    <h3>👥 总用户数</h3>
                    <div class="value" id="totalUsers">0</div>
                </div>
                <div class="stat-card">
                    <h3>✅ 活跃用户</h3>
                    <div class="value" id="activeUsers">0</div>
                </div>
                <div class="stat-card">
                    <h3>💎 总 Tokens</h3>
                    <div class="value" id="totalTokens">0h</div>
                </div>
                <div class="stat-card">
                    <h3>📊 今日使用</h3>
                    <div class="value" id="todayUsage">0</div>
                </div>
            </div>
        </div>

        <div class="glass-card">
            <div class="section-title">
                <span>➕ 添加用户</span>
            </div>
            <form id="addUserForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="newUsername" required placeholder="请输入用户名">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="newPassword" required placeholder="请输入密码">
                    </div>
                    <div class="form-group">
                        <label>初始 Tokens</label>
                        <input type="number" id="initialTokens" value="10000" placeholder="默认 10000">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">创建用户</button>
            </form>
        </div>

        <div class="glass-card">
            <div class="section-title">
                <span>👥 用户列表</span>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>用户名</th>
                        <th>状态</th>
                        <th>剩余 Tokens</th>
                        <th>最后登录</th>
                        <th>注册时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                    <tr>
                        <td colspan="6" style="text-align: center; color: rgba(255,255,255,0.5);">加载中...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 充值弹窗 -->
    <div id="rechargeModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>💎 充值 Tokens</h2>
                <button class="close-btn" onclick="closeModal('rechargeModal')">&times;</button>
            </div>
            <form id="rechargeForm" onsubmit="event.preventDefault(); confirmRecharge();">
                <input type="hidden" id="rechargeUserId">
                <div class="form-group">
                    <label>充值 Tokens 数量</label>
                    <input type="number" id="rechargeTokens" required placeholder="请输入 tokens 数量" min="1">
                </div>
                <button type="button" class="btn btn-primary" style="width: 100%;" onclick="confirmRecharge()">确认充值</button>
            </form>
        </div>
    </div>

    <script>
        let token = null;
        let users = [];

        // 检查登录
        window.addEventListener('load', () => {
            token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/';
                return;
            }
            loadUsers();
        });

        function showMessage(text, type = 'error') {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        async function loadUsers() {
            try {
                const response = await fetch('/api/users', {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                    },
                });

                const data = await response.json();

                if (data.success) {
                    users = data.users;
                    renderUserTable();
                    updateStats();
                } else {
                    showMessage('加载用户失败', 'error');
                }
            } catch (error) {
                console.error('Load users error:', error);
                showMessage('网络错误', 'error');
            }
        }

        function renderUserTable() {
            const tbody = document.getElementById('userTableBody');
            
            // 渲染所有用户
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: rgba(255,255,255,0.5);">暂无用户</td></tr>';
            } else {
                tbody.innerHTML = users.map(user => `
                    <tr>
                        <td>${user.username}</td>
                        <td>
                            <span class="status-badge ${user.status === 'active' ? 'status-active' : 'status-disabled'}">
                                ${user.status === 'active' ? '✅ 正常' : '❌ 禁用'}
                            </span>
                        </td>
                        <td>${user.tokens === -1 ? '∞' : (user.tokens || 0).toLocaleString()}</td>
                        <td>${user.lastLoginAt ? new Date(user.lastLoginAt).toLocaleString('zh-CN') : '从未'}</td>
                        <td>${new Date(user.createdAt).toLocaleString('zh-CN')}</td>
                        <td>
                            <button class="btn btn-primary" onclick="openRechargeModal('${user.id}')">充值</button>
                            <button class="btn btn-danger" onclick="toggleUser('${user.id}')">${user.status === 'active' ? '禁用' : '启用'}</button>
                        </td>
                    </tr>
                `).join('');
            }
        }

        function formatMinutes(minutes) {
            if (minutes >= 60) {
                const hours = Math.floor(minutes / 60);
                const mins = minutes % 60;
                return `${hours}小时${mins}分`;
            }
            return `${minutes}分钟`;
        }

        function updateStats() {
            document.getElementById('totalUsers').textContent = users.length;
            document.getElementById('activeUsers').textContent = users.filter(u => u.status === 'active').length;
            
            const totalTokens = users.reduce((sum, u) => sum + (u.tokens === -1 ? 0 : u.tokens), 0);
            // 直接显示 tokens 数量
            document.getElementById('totalTokens').textContent = totalTokens.toLocaleString();
            
            // 今日使用统计（简化版）
            document.getElementById('todayUsage').textContent = '-';
        }

        // 添加用户
        document.getElementById('addUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('newUsername').value;
            const password = document.getElementById('newPassword').value;
            const initialTokens = parseInt(document.getElementById('initialTokens').value);

            try {
                const response = await fetch(`/api/users`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`,
                    },
                    body: JSON.stringify({ username, password, initialTokens }),
                });

                const data = await response.json();

                if (data.success) {
                    showMessage('用户创建成功', 'success');
                    document.getElementById('addUserForm').reset();
                    loadUsers();
                } else {
                    showMessage(data.error || '创建失败', 'error');
                }
            } catch (error) {
                console.error('Create user error:', error);
                showMessage('网络错误', 'error');
            }
        });

        // 充值
        async function openRechargeModal(userId) {
            console.log('[Recharge] 打开充值弹窗，用户 ID:', userId);
            const userIdEl = document.getElementById('rechargeUserId');
            const tokensEl = document.getElementById('rechargeTokens');
            
            if (!userIdEl) {
                console.error('[Recharge] ❌ 未找到 rechargeUserId 元素');
                return;
            }
            
            userIdEl.value = userId;
            console.log('[Recharge] ✅ 已设置 rechargeUserId:', userIdEl.value);
            
            if (tokensEl) {
                tokensEl.value = '';
                console.log('[Recharge] ✅ 已清空 tokens 输入框');
            }
            
            openModal('rechargeModal');
            console.log('[Recharge] ✅ 已打开弹窗');
        }
        async function confirmRecharge() {
            console.log('[Recharge] 🔵 开始充值流程');
            
            const userIdEl = document.getElementById('rechargeUserId');
            const tokensEl = document.getElementById('rechargeTokens');
            
            if (!userIdEl) {
                console.error('[Recharge] ❌ 未找到 rechargeUserId 元素');
                showMessage('系统错误：找不到用户 ID 字段', 'error');
                return;
            }
            
            if (!tokensEl) {
                console.error('[Recharge] ❌ 未找到 rechargeTokens 元素');
                showMessage('系统错误：找不到 tokens 输入框', 'error');
                return;
            }
            
            const userId = userIdEl.value;
            const tokensValue = tokensEl.value;
            const tokens = parseInt(tokensValue);
            
            console.log('[Recharge] 🔵 充值用户 ID:', userId);
            console.log('[Recharge] 🔵 充值 tokens:', tokens, '类型:', typeof tokens, '原始值:', tokensValue);
            
            if (!userId) {
                showMessage('用户 ID 无效', 'error');
                return;
            }
            
            if (!tokensValue || tokens === 0 || isNaN(tokens)) {
                showMessage('请输入有效的 tokens 数量', 'error');
                return;
            }
            
            if (tokens < 0) {
                showMessage('tokens 数量不能为负数', 'error');
                return;
            }
            
            try {
                console.log('[Recharge] 开始充值...');
                const response = await fetch('/api/users/' + userId + '/recharge-tokens', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token,
                    },
                    body: JSON.stringify({ tokens }),
                });
                
                console.log('[Recharge] 响应状态:', response.status);
                const data = await response.json();
                console.log('[Recharge] 响应数据:', data);
                
                if (data.success) {
                    showMessage('充值成功', 'success');
                    closeModal('rechargeModal');
                    loadUsers();
                } else {
                    showMessage(data.error || '充值失败', 'error');
                }
            } catch (error) {
                console.error('[Recharge] 错误:', error);
                showMessage('网络错误：' + error.message, 'error');
            }
        }
        

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        document.getElementById('rechargeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const userId = document.getElementById('rechargeUserId').value;
            const minutes = parseInt(document.getElementById('rechargeTokens').value);

            try {
                const response = await fetch(`/api/users/${userId}/recharge-tokens`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`,
                    },
                    body: JSON.stringify({ tokens }),
                });

                const data = await response.json();

                if (data.success) {
                    showMessage('充值成功', 'success');
                    closeModal('rechargeModal');
                    loadUsers();
                } else {
                    showMessage(data.error || '充值失败', 'error');
                }
            } catch (error) {
                console.error('Recharge error:', error);
                showMessage('网络错误', 'error');
            }
        });

        // 禁用/启用用户
        async function toggleUser(userId) {
            try {
                const response = await fetch(`/api/users/${userId}/toggle`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                    },
                });

                const data = await response.json();

                if (data.success) {
                    showMessage('操作成功', 'success');
                    loadUsers();
                } else {
                    showMessage(data.error || '操作失败', 'error');
                }
            } catch (error) {
                console.error('Toggle user error:', error);
                showMessage('网络错误', 'error');
            }
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/';
        }

        function openModal(modalId) {
            const modal = document.getElementById(modalId);
            if (modal) {
                modal.classList.add('active');
                console.log('[Modal] ✅ 已打开:', modalId);
            } else {
                console.error('[Modal] ❌ 未找到 modal:', modalId);
            }
        }
            </script>
</body>
</html>
