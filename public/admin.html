<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vclaw · 管理后台</title>
  <link rel="stylesheet" href="./assets/css/app-2026.css">
</head>
<body>
  <div class="admin-container">
    <aside class="admin-sidebar">
      <div class="sidebar-header">
        <h1 class="brand-logo">VCLAW</h1>
        <p class="sidebar-title">管理后台</p>
      </div>
      
      <nav class="admin-nav">
        <a href="#dashboard" class="nav-item active">📊 仪表盘</a>
        <a href="#users" class="nav-item">👥 用户管理</a>
        <a href="#tokens" class="nav-item">💎 Token 管理</a>
        <a href="#logs" class="nav-item">📝 操作日志</a>
        <a href="#settings" class="nav-item">⚙️ 系统设置</a>
      </nav>
      
      <div class="sidebar-footer">
        <a href="/admin-login.html" class="link-logout">退出登录</a>
      </div>
    </aside>
    
    <main class="admin-main">
      <header class="admin-header">
        <h2 id="pageTitle">仪表盘</h2>
        <div class="admin-user">
          <span id="adminName">管理员</span>
        </div>
      </header>
      
      <section id="dashboard" class="admin-section">
        <div class="stats-grid">
          <div class="stat-card">
            <h3>总用户数</h3>
            <p class="stat-value" id="totalUsers">0</p>
          </div>
          <div class="stat-card">
            <h3>今日活跃</h3>
            <p class="stat-value" id="todayActive">0</p>
          </div>
          <div class="stat-card">
            <h3>Token 消耗</h3>
            <p class="stat-value" id="tokenUsage">0</p>
          </div>
          <div class="stat-card">
            <h3>系统状态</h3>
            <p class="stat-value status-ok">✅ 正常</p>
          </div>
        </div>
      </section>
    </main>
  </div>
  
  <script src="./assets/js/admin.js"></script>
</body>
</html>
