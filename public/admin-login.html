<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vclaw · 管理员登录</title>
  <link rel="stylesheet" href="./assets/css/app-2026.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card admin-card">
      <div class="auth-header">
        <h1 class="brand-logo">VCLAW</h1>
        <p class="brand-subtitle">管理员后台</p>
      </div>
      
      <form id="adminLoginForm" class="auth-form">
        <div class="form-group">
          <label for="username">管理员账号</label>
          <input type="text" id="username" name="username" required autocomplete="username" placeholder="请输入管理员账号">
        </div>
        
        <div class="form-group">
          <label for="password">管理员密码</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="请输入密码">
        </div>
        
        <button type="submit" class="btn-primary btn-full">登录</button>
      </form>
      
      <div class="auth-footer">
        <p><a href="/index.html" class="link">返回用户登录</a></p>
      </div>
    </div>
  </div>
  
  <script src="./assets/js/admin.js"></script>
</body>
</html>
