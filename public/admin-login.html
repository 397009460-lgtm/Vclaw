<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - 维克斯 AI 助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            padding: 40px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 64px;
            margin-bottom: 10px;
        }

        .logo h1 {
            color: #fff;
            font-size: 22px;
            font-weight: 600;
        }

        .logo p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            margin-top: 6px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .form-group input:focus {
            border-color: rgba(255, 193, 7, 0.5);
            box-shadow: 0 0 20px rgba(255, 193, 7, 0.2);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ffc107 0%, #ff9800 100%);
            border: 2px solid rgba(255, 193, 7, 0.3);
            border-radius: 14px;
            color: #000;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(255, 193, 7, 0.5);
        }

        .message {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.error {
            background: rgba(255, 87, 87, 0.2);
            border: 1px solid rgba(255, 87, 87, 0.4);
            color: #ff6b6b;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
        }

        .footer a {
            color: rgba(0, 240, 255, 0.8);
            text-decoration: none;
        }
    </style>

    <link rel="stylesheet" href="/assets/css/modern-2026.css">
</head>
<body>
    <div class="container">
        <div class="glass-card">
            <div class="logo">
                <div class="logo-icon">🔐</div>
                <h1>管理员登录</h1>
                <p>维克斯 AI 助手 · 后台管理系统</p>
            </div>

            <div id="message" class="message"></div>

            <form id="adminLoginForm">
                <div class="form-group">
                    <label for="username">管理员账号</label>
                    <input type="text" id="username" name="username" placeholder="请输入管理员账号" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">管理员密码</label>
                    <input type="password" id="password" name="password" placeholder="请输入管理员密码" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn">登 录</button>
            </form>

            <div class="footer">
                <p>💡 管理员账号由系统分配</p>
                <p style="margin-top: 10px;">
                    <a href="/">← 返回首页</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('adminLoginForm');
        const messageDiv = document.getElementById('message');

        function showMessage(text, type = 'error') {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success && data.user.role === 'admin') {
                    localStorage.setItem('token', data.token);
                    showMessage('登录成功！正在跳转...', 'success');
                    setTimeout(() => {
                        window.location.href = '/admin.html';
                    }, 1000);
                } else {
                    showMessage('管理员账号或密码错误', 'error');
                }
            } catch (error) {
                console.error('Login error:', error);
                showMessage('网络错误，请稍后重试', 'error');
            }
        });
    </script>
</body>
</html>
